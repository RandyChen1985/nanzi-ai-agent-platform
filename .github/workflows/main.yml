name: Sync upstream

on:
  schedule:
    # 每天凌晨3点同步
    - cron: "0 9,12,17,20,23 * * *"

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/RandyChen1985/nanzi-ai-agent-platform.git

          git fetch upstream

          git checkout main

          git merge upstream/main

          git push origin main
